name: kita_kita
description: A real-time location sharing app that allows users to share their live GPS location with partners or groups.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  
  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.10 # Idinagdag para sa profile photos
  
  # Navigation
  go_router: ^13.0.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  
  # Maps (OpenSource MapTiler)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Location Services
  geolocator: ^11.0.0
  
  # Battery Status
  battery_plus: ^7.0.0
  
  # Background Tasks
  workmanager: ^0.7.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.0
  logger: ^2.3.0
  image_picker: ^1.0.7 # Idinagdag para makapag-select ng photo

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
  - assets/kita_kita.png